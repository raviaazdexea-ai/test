<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Naga Kepala Jelas</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    cursor: crosshair;
  }
  canvas { display: block; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = { x: canvas.width/2, y: canvas.height/2 };

window.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

class Dragon {
  constructor(length) {
    this.points = [];
    this.spacing = 10;

    for (let i = 0; i < length; i++) {
      this.points.push({ x: mouse.x, y: mouse.y });
    }
  }

  update() {
    this.points[0].x += (mouse.x - this.points[0].x) * 0.15;
    this.points[0].y += (mouse.y - this.points[0].y) * 0.15;

    for (let i = 1; i < this.points.length; i++) {
      let prev = this.points[i - 1];
      let curr = this.points[i];

      let dx = curr.x - prev.x;
      let dy = curr.y - prev.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if (dist > 0) {
        let diff = (dist - this.spacing) / dist;
        curr.x -= dx * diff;
        curr.y -= dy * diff;
      }
    }
  }

  drawBody() {
    ctx.lineCap = "round";

    for (let i = this.points.length - 1; i > 0; i--) {
      let p = this.points[i];
      let next = this.points[i - 1];

      let size = (this.points.length - i) * 0.7;

      ctx.beginPath();
      ctx.strokeStyle = "white";
      ctx.lineWidth = size;
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(next.x, next.y);
      ctx.stroke();
    }
  }

  drawHead() {
    let head = this.points[0];
    let next = this.points[1];

    let angle = Math.atan2(next.y - head.y, next.x - head.x);

    ctx.save();
    ctx.translate(head.x, head.y);
    ctx.rotate(angle);

    ctx.fillStyle = "white";

    // === KEPALA BESAR ===
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(35, -12);
    ctx.lineTo(60, -8);
    ctx.lineTo(70, 0);
    ctx.lineTo(60, 8);
    ctx.lineTo(35, 12);
    ctx.closePath();
    ctx.fill();

    // === RAHANG BAWAH ===
    ctx.beginPath();
    ctx.moveTo(25, 10);
    ctx.lineTo(60, 20);
    ctx.lineTo(40, 12);
    ctx.closePath();
    ctx.fill();

    // === TANDUK ATAS ===
    ctx.beginPath();
    ctx.moveTo(20, -10);
    ctx.lineTo(35, -30);
    ctx.lineTo(10, -15);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(40, -8);
    ctx.lineTo(55, -25);
    ctx.lineTo(30, -12);
    ctx.closePath();
    ctx.fill();

    // === GIGI ===
    ctx.fillStyle = "black";
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.moveTo(40 + i*5, 5);
      ctx.lineTo(42 + i*5, 10);
      ctx.lineTo(38 + i*5, 10);
      ctx.fill();
    }

    // === MATA ===
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(40, -3, 3, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  draw() {
    this.drawBody();
    this.drawHead();
  }
}

const dragon = new Dragon(50);

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  dragon.update();
  dragon.draw();

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
