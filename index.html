<!DOCTYPE html>
<html>
<head>
  <title>Toko Online Demo Pro</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f5f5f5; }
    .hidden { display: none; }
    .box { background: white; padding: 20px; margin: 20px auto; width: 320px; border-radius: 10px; }
    input { margin: 5px; padding: 8px; width: 90%; }
    button { padding: 8px 15px; margin: 5px; cursor: pointer; }
    .product { background: white; margin: 10px; padding: 10px; border-radius: 10px; }
    img { width: 100px; height: 100px; object-fit: cover; }
    #message { color: red; }
  </style>
</head>
<body>

<h1>Toko Online Demo Pro</h1>

<!-- REGISTER -->
<div id="registerPage" class="box">
  <h2>Register</h2>
  <input type="text" id="regUser" placeholder="Username"><br>
  <input type="password" id="regPass" placeholder="Password"><br>
  <button onclick="register()">Register</button>
  <p>Sudah punya akun? <a href="#" onclick="showLogin()">Login</a></p>
</div>

<!-- LOGIN -->
<div id="loginPage" class="box hidden">
  <h2>Login</h2>
  <input type="text" id="logUser" placeholder="Username"><br>
  <input type="password" id="logPass" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- SHOP -->
<div id="shopPage" class="hidden">
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>

  <h2>Produk</h2>
  <div id="productList"></div>
</div>

<!-- ADMIN -->
<div id="adminPage" class="hidden">
  <h2>ADMIN PANEL</h2>
  <button onclick="logout()">Logout</button>

  <h3>Tambah Produk</h3>
  <input type="text" id="pName" placeholder="Nama Produk"><br>
  <input type="number" id="pPrice" placeholder="Harga"><br>
  <input type="file" id="pImage"><br>
  <button onclick="addProduct()">Tambah</button>

  <h3>Daftar Produk</h3>
  <div id="adminProductList"></div>
</div>

<p id="message"></p>

<script>
// REGISTER
function register() {
  if(regUser.value && regPass.value) {
    localStorage.setItem(regUser.value, regPass.value);
    message.innerText = "Register berhasil!";
    showLogin();
  } else {
    message.innerText = "Isi semua data!";
  }
}

// LOGIN
function login() {
  let user = logUser.value;
  let pass = logPass.value;

  // ADMIN
  if(user === "ADMINDEDI" && pass === "PASSWORDEDI") {
    localStorage.setItem("role", "admin");
    showAdmin();
    return;
  }

  let savedPass = localStorage.getItem(user);

  // USER BELUM ADA
  if(savedPass === null) {
    message.innerText = "Akun belum terdaftar, silakan register terlebih dahulu!";
    return;
  }

  // PASSWORD SALAH
  if(savedPass !== pass) {
    message.innerText = "Password salah!";
    return;
  }

  // LOGIN BERHASIL
  localStorage.setItem("loginUser", user);
  localStorage.setItem("role", "user");
  showShop();
}

// NAVIGASI
function showLogin() {
  registerPage.classList.add("hidden");
  loginPage.classList.remove("hidden");
}

function showShop() {
  loginPage.classList.add("hidden");
  registerPage.classList.add("hidden");
  shopPage.classList.remove("hidden");

  welcome.innerText = "Halo, " + localStorage.getItem("loginUser");
  loadProducts();
}

function showAdmin() {
  loginPage.classList.add("hidden");
  registerPage.classList.add("hidden");
  adminPage.classList.remove("hidden");

  loadAdminProducts();
}

// LOGOUT
function logout() {
  localStorage.clear();
  location.reload();
}

// PRODUCT SYSTEM
function getProducts() {
  return JSON.parse(localStorage.getItem("products")) || [];
}

function saveProducts(data) {
  localStorage.setItem("products", JSON.stringify(data));
}

// TAMBAH PRODUK
function addProduct() {
  let name = pName.value;
  let price = pPrice.value;
  let file = pImage.files[0];

  if(!name || !price || !file) {
    alert("Lengkapi data!");
    return;
  }

  let reader = new FileReader();
  reader.onload = function(e) {
    let products = getProducts();
    products.push({
      name,
      price,
      image: e.target.result
    });
    saveProducts(products);
    loadAdminProducts();
  }
  reader.readAsDataURL(file);
}

// TAMPIL PRODUK USER
function loadProducts() {
  let products = getProducts();
  productList.innerHTML = "";

  if(products.length === 0) {
    productList.innerHTML = "<p>Belum ada produk</p>";
    return;
  }

  products.forEach(p => {
    productList.innerHTML += `
      <div class="product">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>Rp${p.price}</p>
      </div>
    `;
  });
}

// ADMIN VIEW
function loadAdminProducts() {
  let products = getProducts();
  adminProductList.innerHTML = "";

  products.forEach((p, i) => {
    adminProductList.innerHTML += `
      <div class="product">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>Rp${p.price}</p>
        <button onclick="deleteProduct(${i})">Hapus</button>
      </div>
    `;
  });
}

// HAPUS PRODUK
function deleteProduct(i) {
  let products = getProducts();
  products.splice(i, 1);
  saveProducts(products);
  loadAdminProducts();
}

// AUTO LOGIN
window.onload = function() {
  let role = localStorage.getItem("role");

  if(role === "admin") showAdmin();
  else if(localStorage.getItem("loginUser")) showShop();
}
</script>

</body>
</html>
