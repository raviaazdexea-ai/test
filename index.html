<!DOCTYPE html>
<html>
<head>
  <title>Toko Online Demo</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f5f5f5; }
    .hidden { display: none; }
    .box { background: white; padding: 20px; margin: 20px auto; width: 300px; border-radius: 10px; }
    input { margin: 5px; padding: 8px; width: 90%; }
    button { padding: 8px 15px; margin-top: 5px; cursor: pointer; }
    .product { background: white; margin: 10px; padding: 10px; border-radius: 10px; }
  </style>
</head>
<body>

<h1>Toko Online Demo</h1>

<!-- REGISTER -->
<div id="registerPage" class="box">
  <h2>Register</h2>
  <input type="text" id="regUser" placeholder="Username"><br>
  <input type="password" id="regPass" placeholder="Password"><br>
  <button onclick="register()">Register</button>
  <p>Sudah punya akun? <a href="#" onclick="showLogin()">Login</a></p>
</div>

<!-- LOGIN -->
<div id="loginPage" class="box hidden">
  <h2>Login</h2>
  <input type="text" id="logUser" placeholder="Username"><br>
  <input type="password" id="logPass" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- SHOP -->
<div id="shopPage" class="hidden">
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>

  <h2>Produk</h2>

  <div class="product">
    <h3>Kaos</h3>
    <p>Rp50.000</p>
    <button onclick="addToCart('Kaos', 50000)">Beli</button>
  </div>

  <div class="product">
    <h3>Sepatu</h3>
    <p>Rp150.000</p>
    <button onclick="addToCart('Sepatu', 150000)">Beli</button>
  </div>

  <h3>Keranjang</h3>
  <ul id="cartList"></ul>
  <p id="total"></p>
</div>

<!-- ADMIN -->
<div id="adminPage" class="box hidden">
  <h2>HALAMAN ADMIN</h2>
  <button onclick="logout()">Logout</button>

  <p>Selamat datang ADMIN!</p>

  <h3>Daftar User:</h3>
  <ul id="userList"></ul>
</div>

<p id="message"></p>

<script>
// REGISTER
function register() {
  let user = regUser.value;
  let pass = regPass.value;

  if(user && pass) {
    localStorage.setItem(user, pass);
    message.innerText = "Register berhasil!";
    showLogin();
  } else {
    message.innerText = "Isi semua data!";
  }
}

// LOGIN
function login() {
  let user = logUser.value;
  let pass = logPass.value;

  // ADMIN LOGIN
  if(user === "ADMINDEDI" && pass === "PASSWORDEDI") {
    localStorage.setItem("role", "admin");
    showAdmin();
    return;
  }

  // USER LOGIN
  let savedPass = localStorage.getItem(user);

  if(savedPass === pass) {
    localStorage.setItem("loginUser", user);
    localStorage.setItem("role", "user");
    showShop();
  } else {
    message.innerText = "Login gagal!";
  }
}

// LOGOUT
function logout() {
  localStorage.clear();
  location.reload();
}

// NAVIGASI
function showLogin() {
  registerPage.classList.add("hidden");
  loginPage.classList.remove("hidden");
}

function showShop() {
  loginPage.classList.add("hidden");
  registerPage.classList.add("hidden");
  shopPage.classList.remove("hidden");

  let user = localStorage.getItem("loginUser");
  welcome.innerText = "Halo, " + user;

  loadCart();
}

// ADMIN
function showAdmin() {
  loginPage.classList.add("hidden");
  registerPage.classList.add("hidden");
  shopPage.classList.add("hidden");
  adminPage.classList.remove("hidden");

  loadUsers();
}

function loadUsers() {
  userList.innerHTML = "";

  for(let i = 0; i < localStorage.length; i++) {
    let key = localStorage.key(i);

    if(key !== "loginUser" && key !== "role" && key !== "cart") {
      let li = document.createElement("li");
      li.innerText = key;
      userList.appendChild(li);
    }
  }
}

// CART
function addToCart(item, price) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({item, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

function loadCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cartList.innerHTML = "";

  let totalHarga = 0;

  cart.forEach(data => {
    let li = document.createElement("li");
    li.innerText = data.item + " - Rp" + data.price;
    cartList.appendChild(li);

    totalHarga += data.price;
  });

  total.innerText = "Total: Rp" + totalHarga;
}

// AUTO LOGIN
window.onload = function() {
  let role = localStorage.getItem("role");

  if(role === "admin") {
    showAdmin();
  } else if(localStorage.getItem("loginUser")) {
    showShop();
  }
}
</script>

</body>
</html>
