<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Naga Realistis</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    cursor: none;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = { x: canvas.width / 2, y: canvas.height / 2 };

window.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

class Dragon {
  constructor(length) {
    this.points = [];
    this.length = length;

    for (let i = 0; i < length; i++) {
      this.points.push({ x: mouse.x, y: mouse.y });
    }
  }

  update() {
    // kepala mengikuti mouse
    this.points[0].x += (mouse.x - this.points[0].x) * 0.2;
    this.points[0].y += (mouse.y - this.points[0].y) * 0.2;

    // tubuh mengikuti dengan delay + efek gelombang
    for (let i = 1; i < this.points.length; i++) {
      const prev = this.points[i - 1];
      const p = this.points[i];

      let dx = prev.x - p.x;
      let dy = prev.y - p.y;

      let angle = Math.atan2(dy, dx);

      // jarak antar segmen
      let distance = 12;

      p.x = prev.x - Math.cos(angle) * distance;
      p.y = prev.y - Math.sin(angle) * distance;

      // efek goyangan naga
      let wave = Math.sin((Date.now() * 0.005) + i * 0.5) * 2;
      p.x += Math.cos(angle + Math.PI/2) * wave;
      p.y += Math.sin(angle + Math.PI/2) * wave;
    }
  }

  draw() {
    ctx.lineCap = "round";

    for (let i = this.points.length - 1; i > 0; i--) {
      let p = this.points[i];
      let next = this.points[i - 1];

      // ukuran makin kecil ke belakang
      let size = (this.length - i) * 0.6;

      ctx.beginPath();
      ctx.strokeStyle = "white";
      ctx.lineWidth = size;
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(next.x, next.y);
      ctx.stroke();
    }

    // kepala naga (glow)
    let head = this.points[0];

    let gradient = ctx.createRadialGradient(
      head.x, head.y, 2,
      head.x, head.y, 20
    );

    gradient.addColorStop(0, "#ffffff");
    gradient.addColorStop(1, "rgba(255,255,255,0)");

    ctx.beginPath();
    ctx.fillStyle = gradient;
    ctx.arc(head.x, head.y, 20, 0, Math.PI * 2);
    ctx.fill();
  }
}

const dragon = new Dragon(60);

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  dragon.update();
  dragon.draw();

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
