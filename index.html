<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Naga Makan Cursor</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    cursor: crosshair;
    font-family: monospace;
  }

  canvas {
    display: block;
  }

  #info {
    position: fixed;
    top: 10px;
    right: 10px;
    color: #00ffcc;
    background: rgba(0,0,0,0.6);
    padding: 10px;
    border: 1px solid #00ffcc;
    border-radius: 8px;
    font-size: 14px;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="info">Status: Idle</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = { x: canvas.width/2, y: canvas.height/2 };
let biteEffect = 0;

window.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

class Dragon {
  constructor(length) {
    this.points = [];
    this.length = length;

    for (let i = 0; i < length; i++) {
      this.points.push({ x: mouse.x, y: mouse.y });
    }
  }

  update() {
    this.points[0].x += (mouse.x - this.points[0].x) * 0.2;
    this.points[0].y += (mouse.y - this.points[0].y) * 0.2;

    for (let i = 1; i < this.points.length; i++) {
      const prev = this.points[i - 1];
      const p = this.points[i];

      let dx = prev.x - p.x;
      let dy = prev.y - p.y;

      let angle = Math.atan2(dy, dx);
      let distance = 12;

      p.x = prev.x - Math.cos(angle) * distance;
      p.y = prev.y - Math.sin(angle) * distance;

      let wave = Math.sin((Date.now()*0.005)+i*0.5)*2;
      p.x += Math.cos(angle + Math.PI/2)*wave;
      p.y += Math.sin(angle + Math.PI/2)*wave;
    }
  }

  draw() {
    ctx.lineCap = "round";

    for (let i = this.points.length - 1; i > 0; i--) {
      let p = this.points[i];
      let next = this.points[i - 1];
      let size = (this.length - i) * 0.6;

      ctx.beginPath();
      ctx.strokeStyle = "white";
      ctx.lineWidth = size;
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(next.x, next.y);
      ctx.stroke();
    }

    let head = this.points[0];

    // cek jarak ke cursor
    let dx = head.x - mouse.x;
    let dy = head.y - mouse.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    let eating = dist < 25;

    if (eating) {
      biteEffect = 10;
      info.innerHTML = "Status: EATING 😈";
    } else {
      info.innerHTML = "Status: Hunting...";
    }

    // efek kepala
    let radius = eating ? 25 : 18;

    let gradient = ctx.createRadialGradient(
      head.x, head.y, 2,
      head.x, head.y, radius
    );

    gradient.addColorStop(0, eating ? "#ff4444" : "#ffffff");
    gradient.addColorStop(1, "rgba(255,255,255,0)");

    ctx.beginPath();
    ctx.fillStyle = gradient;
    ctx.arc(head.x, head.y, radius, 0, Math.PI*2);
    ctx.fill();

    // efek gigitan (pulse)
    if (biteEffect > 0) {
      ctx.beginPath();
      ctx.strokeStyle = "red";
      ctx.lineWidth = 2;
      ctx.arc(mouse.x, mouse.y, 20 + biteEffect, 0, Math.PI*2);
      ctx.stroke();
      biteEffect--;
    }
  }

  getHead() {
    return this.points[0];
  }
}

const dragon = new Dragon(60);

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  dragon.update();
  dragon.draw();

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
